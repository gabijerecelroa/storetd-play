<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StoreTD Play - Revendedor</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0b0f18;color:#fff}
    header{padding:22px;background:#111827;border-bottom:1px solid #263246}
    main{max-width:1100px;margin:auto;padding:20px}
    .card{background:#121a29;border:1px solid #263246;border-radius:18px;padding:18px;margin-bottom:18px}
    input,select,textarea{width:100%;box-sizing:border-box;padding:12px;border-radius:12px;border:1px solid #344256;background:#0b1220;color:#fff;margin:6px 0}
    button{padding:11px 14px;border-radius:12px;border:0;background:#e11d48;color:white;font-weight:bold;cursor:pointer}
    button.secondary{background:#334155}
    button.success{background:#16a34a}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .client{border:1px solid #334155;border-radius:14px;padding:14px;margin:10px 0;background:#0f172a}
    .muted{color:#94a3b8}
    .pill{display:inline-block;background:#1f2937;border-radius:999px;padding:6px 10px;margin:3px}
    .hidden{display:none}
  </style>
</head>
<body>
<header>
  <h1>StoreTD Play - Panel Revendedor</h1>
  <div id="who" class="muted"></div>
</header>
<main>
  <section id="login" class="card">
    <h2>Ingresar</h2>
    <input id="resellerKey" placeholder="Clave de revendedor" />
    <button onclick="login()">Entrar</button>
    <p id="loginMsg" class="muted"></p>
  </section>

  <section id="dashboard" class="hidden">
    <div class="card">
      <h2>Créditos</h2>
      <div id="credits" style="font-size:34px;font-weight:bold">0</div>
      <p class="muted">1 crédito = 1 mes de servicio.</p>
      <button class="secondary" onclick="logout()">Salir</button>
    </div>

    <div class="card">
      <h2>Crear cliente</h2>
      <div class="grid">
        <input id="newCustomerName" placeholder="Nombre cliente" />
        <input id="newActivationCode" placeholder="Código opcional; vacío genera automático" />
        <select id="newMonths">
          <option value="1">1 mes</option>
          <option value="2">2 meses</option>
          <option value="3">3 meses</option>
          <option value="6">6 meses</option>
          <option value="12">12 meses</option>
        </select>
        <input id="newMaxDevices" type="number" value="1" min="1" max="10" />
      </div>
      <button class="success" onclick="createClient()">Crear usando créditos</button>
      <p id="createMsg" class="muted"></p>
    </div>

    <div class="card">
      <h2>Mis clientes</h2>
      <button class="secondary" onclick="loadAll()">Actualizar</button>
      <div id="clients"></div>
    </div>

    <div class="card">
      <h2>Enviar reclamo o pedido</h2>
      <div class="grid">
        <select id="requestType">
          <option value="Reclamo cliente">Reclamo cliente</option>
          <option value="Pedido canal">Pedido canal</option>
          <option value="Pedido película">Pedido película</option>
          <option value="Pedido serie">Pedido serie</option>
          <option value="Otro">Otro</option>
        </select>
        <input id="requestActivationCode" placeholder="Código cliente opcional" />
        <input id="requestCustomerName" placeholder="Cliente opcional" />
        <input id="requestContentTitle" placeholder="Canal / película / serie opcional" />
      </div>
      <textarea id="requestMessage" rows="4" placeholder="Detalle del pedido o reclamo"></textarea>
      <button onclick="sendRequest()">Enviar</button>
      <p id="requestMsg" class="muted"></p>
    </div>
  </section>
</main>

<script>
let key = localStorage.getItem("resellerKey") || "";

function $(id){return document.getElementById(id)}
function esc(v){return String(v||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}

async function api(path, options={}){
  const res = await fetch(path, {
    ...options,
    headers: {
      "Content-Type":"application/json",
      "x-reseller-key": key,
      ...(options.headers || {})
    }
  });
  const data = await res.json().catch(()=>({success:false,message:"Respuesta inválida"}));
  if(!res.ok || data.success === false) throw new Error(data.message || "Error");
  return data;
}

async function login(){
  key = $("resellerKey").value.trim();
  localStorage.setItem("resellerKey", key);
  try{
    await loadAll();
    $("login").classList.add("hidden");
    $("dashboard").classList.remove("hidden");
  }catch(e){
    $("loginMsg").textContent = e.message;
  }
}

function logout(){
  localStorage.removeItem("resellerKey");
  location.reload();
}

async function loadAll(){
  const me = await api("/reseller/api/me");
  $("who").textContent = `${me.reseller.name} - créditos: ${me.reseller.credits}`;
  $("credits").textContent = me.reseller.credits;

  const data = await api("/reseller/api/clients");
  renderClients(data.clients || []);
}

function renderClients(clients){
  if(!clients.length){
    $("clients").innerHTML = "<p class='muted'>No hay clientes.</p>";
    return;
  }

  $("clients").innerHTML = clients.map(c => `
    <div class="client">
      <strong>${esc(c.customerName)}</strong>
      <span class="pill">${esc(c.activationCode)}</span>
      <span class="pill">${esc(c.status)}</span>
      <span class="pill">Vence: ${esc(c.expiresAt)}</span>
      <p class="muted">Dispositivos: ${esc(c.maxDevices)}</p>
      <select id="renew-${esc(c.activationCode)}">
        <option value="1">Renovar 1 mes</option>
        <option value="2">Renovar 2 meses</option>
        <option value="3">Renovar 3 meses</option>
        <option value="6">Renovar 6 meses</option>
        <option value="12">Renovar 12 meses</option>
      </select>
      <button onclick='renewClient(${JSON.stringify(c.activationCode)})'>Renovar</button>
    </div>
  `).join("");
}

async function createClient(){
  $("createMsg").textContent = "Creando...";
  try{
    await api("/reseller/api/clients", {
      method:"POST",
      body: JSON.stringify({
        customerName: $("newCustomerName").value,
        activationCode: $("newActivationCode").value,
        months: $("newMonths").value,
        maxDevices: $("newMaxDevices").value
      })
    });
    $("createMsg").textContent = "Cliente creado.";
    $("newCustomerName").value = "";
    $("newActivationCode").value = "";
    await loadAll();
  }catch(e){
    $("createMsg").textContent = e.message;
  }
}

async function renewClient(code){
  const months = document.getElementById(`renew-${code}`).value;
  if(!confirm(`Renovar ${code} por ${months} mes(es)?`)) return;
  try{
    await api(`/reseller/api/clients/${encodeURIComponent(code)}/renew`, {
      method:"POST",
      body: JSON.stringify({months})
    });
    await loadAll();
  }catch(e){
    alert(e.message);
  }
}

async function sendRequest(){
  $("requestMsg").textContent = "Enviando...";
  try{
    await api("/reseller/api/requests", {
      method:"POST",
      body: JSON.stringify({
        requestType: $("requestType").value,
        activationCode: $("requestActivationCode").value,
        customerName: $("requestCustomerName").value,
        contentTitle: $("requestContentTitle").value,
        message: $("requestMessage").value
      })
    });
    $("requestMsg").textContent = "Pedido enviado.";
    $("requestMessage").value = "";
  }catch(e){
    $("requestMsg").textContent = e.message;
  }
}

if(key){
  $("resellerKey").value = key;
  login();
}
</script>
</body>
</html>

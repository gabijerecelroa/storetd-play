<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StoreTD Play Admin</title>
  <style>
    :root {
      --bg: #050505;
      --card: #1f1f24;
      --card2: #2c2c33;
      --text: #ffffff;
      --muted: #b8b8c2;
      --red: #e50914;
      --border: #3a3a44;
      --green: #1e8e3e;
      --yellow: #d39e00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      padding: 22px;
      background: #0d0d0f;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      margin: 0;
      color: var(--red);
      font-size: 28px;
    }

    main {
      padding: 18px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      background: #08080a;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 15px;
    }

    textarea {
      min-height: 80px;
    }

    button {
      background: var(--red);
      color: white;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin: 4px;
    }

    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
    }

    button.danger {
      background: #8f1118;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      background: var(--card2);
      border-radius: 14px;
      padding: 14px;
      border: 1px solid var(--border);
    }

    .stat strong {
      display: block;
      font-size: 28px;
      color: var(--red);
    }

    .client, .report {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .client h3, .report h3 {
      margin: 0 0 8px;
    }

    .muted {
      color: var(--muted);
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #111;
      border: 1px solid var(--border);
      margin: 4px 0;
    }

    .badge.pending { border-color: var(--yellow); }
    .badge.done { border-color: var(--green); }

    .actions {
      margin-top: 12px;
    }

    .message {
      padding: 12px;
      border-radius: 12px;
      background: #111;
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab {
      background: transparent;
      border: 1px solid var(--border);
    }

    .tab.active {
      background: var(--red);
      border-color: var(--red);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .grid, .stats {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>StoreTD Play Admin</h1>
    <div class="muted">Clientes, reportes y estadísticas</div>
  </header>

  <main>
    <div id="message"></div>

    <section class="card">
      <h2>Acceso admin</h2>
      <label>Clave admin</label>
      <input id="adminKey" type="password" placeholder="ADMIN_KEY" />
      <button onclick="saveKey()">Guardar clave</button>
      <button class="secondary" onclick="refreshAll()">Actualizar todo</button>
    </section>

    <section class="card">
      <h2>Estadísticas</h2>
      <div id="stats" class="stats"></div>
    </section>

    <div class="tabs">
      <button id="tabClients" class="tab active" onclick="showTab('clients')">Clientes</button>
      <button id="tabReports" class="tab" onclick="showTab('reports')">Reportes</button>
      <button id="tabGrouped" class="tab" onclick="showTab('grouped')">Canales más reportados</button>
    </div>

    <section id="sectionClients">
      <section class="card">
        <h2>Crear cliente</h2>

        <div class="grid">
          <div>
            <label>Nombre</label>
            <input id="newCustomerName" placeholder="Jose" />
          </div>

          <div>
            <label>Código de activación</label>
            <input id="newActivationCode" placeholder="JOSE2026" />
          </div>

          <div>
            <label>Estado</label>
            <select id="newStatus">
              <option>Activa</option>
              <option>Prueba</option>
              <option>Vencida</option>
              <option>Suspendida</option>
            </select>
          </div>

          <div>
            <label>Vencimiento</label>
            <input id="newExpiresAt" type="date" />
          </div>

          <div>
            <label>Máximo dispositivos</label>
            <input id="newMaxDevices" type="number" min="1" value="1" />
          </div>

          <div>
            <label>EPG URL</label>
            <input id="newEpgUrl" placeholder="https://..." />
          </div>
        </div>

        <label>Playlist M3U URL autorizada</label>
        <input id="newPlaylistUrl" placeholder="https://..." />

        <button onclick="createClient()">Crear cliente</button>
      </section>

      <section class="card">
        <h2>Clientes</h2>
        <div id="clients"></div>
      </section>
    </section>

    <section id="sectionReports" class="hidden">
      <section class="card">
        <h2>Reportes de canales</h2>
        <div id="reports"></div>
      </section>
    </section>

    <section id="sectionGrouped" class="hidden">
      <section class="card">
        <h2>Canales más reportados</h2>
        <div id="groupedReports"></div>
      </section>
    </section>
  </main>

  <script>
    const apiBase = "";
    const adminKeyInput = document.getElementById("adminKey");
    const messageBox = document.getElementById("message");
    const clientsBox = document.getElementById("clients");
    const reportsBox = document.getElementById("reports");
    const groupedReportsBox = document.getElementById("groupedReports");
    const statsBox = document.getElementById("stats");

    adminKeyInput.value = localStorage.getItem("storetd_admin_key") || "";

    function showTab(tab) {
      document.getElementById("sectionClients").classList.toggle("hidden", tab !== "clients");
      document.getElementById("sectionReports").classList.toggle("hidden", tab !== "reports");
      document.getElementById("sectionGrouped").classList.toggle("hidden", tab !== "grouped");

      document.getElementById("tabClients").classList.toggle("active", tab === "clients");
      document.getElementById("tabReports").classList.toggle("active", tab === "reports");
      document.getElementById("tabGrouped").classList.toggle("active", tab === "grouped");
    }

    function showMessage(text) {
      messageBox.innerHTML = text ? `<div class="message">${escapeHtml(text)}</div>` : "";
    }

    function saveKey() {
      localStorage.setItem("storetd_admin_key", adminKeyInput.value);
      showMessage("Clave guardada en este navegador.");
    }

    function getKey() {
      return adminKeyInput.value || localStorage.getItem("storetd_admin_key") || "";
    }

    async function api(path, options = {}) {
      const response = await fetch(apiBase + path, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          "x-admin-key": getKey(),
          ...(options.headers || {})
        }
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.message || "Error de servidor");
      }

      return data;
    }

    async function refreshAll() {
      await Promise.allSettled([
        loadStats(),
        loadClients(),
        loadReports()
      ]);
    }

    async function loadStats() {
      try {
        const data = await api("/admin/api/stats");
        const stats = data.stats || {};

        statsBox.innerHTML = `
          ${stat("Clientes", stats.clientsTotal || 0)}
          ${stat("Activos", stats.clientsActive || 0)}
          ${stat("Reportes", stats.reportsTotal || 0)}
          ${stat("Pendientes", stats.reportsPending || 0)}
        `;
      } catch (error) {
        showMessage(error.message);
      }
    }

    function stat(label, value) {
      return `<div class="stat"><strong>${escapeHtml(value)}</strong><span class="muted">${escapeHtml(label)}</span></div>`;
    }

    async function loadClients() {
      try {
        const data = await api("/admin/api/clients");
        renderClients(data.clients || []);
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function createClient() {
      try {
        const body = {
          customerName: document.getElementById("newCustomerName").value,
          activationCode: document.getElementById("newActivationCode").value,
          status: document.getElementById("newStatus").value,
          expiresAt: document.getElementById("newExpiresAt").value,
          maxDevices: Number(document.getElementById("newMaxDevices").value || 1),
          playlistUrl: document.getElementById("newPlaylistUrl").value,
          epgUrl: document.getElementById("newEpgUrl").value
        };

        await api("/admin/api/clients", {
          method: "POST",
          body: JSON.stringify(body)
        });

        showMessage("Cliente creado.");
        refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function updateClient(code) {
      try {
        const body = {
          customerName: document.getElementById(`name-${code}`).value,
          status: document.getElementById(`status-${code}`).value,
          expiresAt: document.getElementById(`expires-${code}`).value,
          maxDevices: Number(document.getElementById(`max-${code}`).value || 1),
          playlistUrl: document.getElementById(`playlist-${code}`).value,
          epgUrl: document.getElementById(`epg-${code}`).value
        };

        await api(`/admin/api/clients/${encodeURIComponent(code)}`, {
          method: "PUT",
          body: JSON.stringify(body)
        });

        showMessage("Cliente actualizado.");
        refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function deleteClient(code) {
      if (!confirm("¿Eliminar cliente?")) return;

      try {
        await api(`/admin/api/clients/${encodeURIComponent(code)}`, {
          method: "DELETE"
        });

        showMessage("Cliente eliminado.");
        refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function unlinkDevices(code) {
      if (!confirm("¿Desvincular dispositivos de este cliente?")) return;

      try {
        await api(`/admin/api/clients/${encodeURIComponent(code)}/unlink-devices`, {
          method: "POST",
          body: JSON.stringify({})
        });

        showMessage("Dispositivos desvinculados.");
        refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function loadReports() {
      try {
        const data = await api("/admin/api/reports");
        renderReports(data.reports || []);
        renderGroupedReports(data.grouped || []);
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function updateReport(id) {
      try {
        const body = {
          status: document.getElementById(`report-status-${id}`).value,
          internalComment: document.getElementById(`report-comment-${id}`).value
        };

        await api(`/admin/api/reports/${encodeURIComponent(id)}`, {
          method: "PUT",
          body: JSON.stringify(body)
        });

        showMessage("Reporte actualizado.");
        refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function deleteReport(id) {
      if (!confirm("¿Eliminar reporte?")) return;

      try {
        await api(`/admin/api/reports/${encodeURIComponent(id)}`, {
          method: "DELETE"
        });

        showMessage("Reporte eliminado.");
        refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    function renderClients(clients) {
      if (!clients.length) {
        clientsBox.innerHTML = "<p class='muted'>No hay clientes.</p>";
        return;
      }

      clientsBox.innerHTML = clients.map((client) => {
        const code = escapeAttr(client.activationCode);

        return `
          <div class="client">
            <h3>${escapeHtml(client.customerName)} <span class="badge">${escapeHtml(client.status)}</span></h3>
            <div class="muted">Código: ${escapeHtml(client.activationCode)}</div>
            <div class="muted">Dispositivos: ${client.deviceCount || 0}/${client.maxDevices || 1}</div>
            <div class="muted">Registrados: ${(client.devices || []).map(escapeHtml).join(", ") || "ninguno"}</div>

            <div class="grid" style="margin-top:12px">
              <div>
                <label>Nombre</label>
                <input id="name-${code}" value="${escapeAttr(client.customerName)}" />
              </div>

              <div>
                <label>Estado</label>
                <select id="status-${code}">
                  ${option("Activa", client.status)}
                  ${option("Prueba", client.status)}
                  ${option("Vencida", client.status)}
                  ${option("Suspendida", client.status)}
                </select>
              </div>

              <div>
                <label>Vencimiento</label>
                <input id="expires-${code}" type="date" value="${escapeAttr(client.expiresAt || "")}" />
              </div>

              <div>
                <label>Máximo dispositivos</label>
                <input id="max-${code}" type="number" min="1" value="${escapeAttr(client.maxDevices || 1)}" />
              </div>

              <div>
                <label>EPG URL</label>
                <input id="epg-${code}" value="${escapeAttr(client.epgUrl || "")}" />
              </div>
            </div>

            <label>Playlist URL autorizada</label>
            <input id="playlist-${code}" value="${escapeAttr(client.playlistUrl || "")}" />

            <div class="actions">
              <button onclick="updateClient('${code}')">Guardar</button>
              <button class="secondary" onclick="unlinkDevices('${code}')">Desvincular dispositivos</button>
              <button class="danger" onclick="deleteClient('${code}')">Eliminar</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderReports(reports) {
      if (!reports.length) {
        reportsBox.innerHTML = "<p class='muted'>No hay reportes.</p>";
        return;
      }

      reportsBox.innerHTML = reports.map((report) => {
        const id = escapeAttr(report.id);

        return `
          <div class="report">
            <h3>${escapeHtml(report.channelName)} <span class="badge ${report.status === "Pendiente" ? "pending" : "done"}">${escapeHtml(report.status)}</span></h3>
            <div class="muted">Problema: ${escapeHtml(report.problemType)}</div>
            <div class="muted">Categoría: ${escapeHtml(report.category)}</div>
            <div class="muted">Cliente: ${escapeHtml(report.customerName)} (${escapeHtml(report.activationCode)})</div>
            <div class="muted">Dispositivo: ${escapeHtml(report.deviceModel)} / Android ${escapeHtml(report.androidVersion)}</div>
            <div class="muted">Código dispositivo: ${escapeHtml(report.deviceCode)}</div>
            <div class="muted">URL: ${escapeHtml(report.streamUrlMasked)}</div>
            <div class="muted">Error reproductor: ${escapeHtml(report.playerError)}</div>
            <div class="muted">Fecha: ${escapeHtml(report.createdAt)}</div>

            <div class="grid" style="margin-top:12px">
              <div>
                <label>Estado</label>
                <select id="report-status-${id}">
                  ${option("Pendiente", report.status)}
                  ${option("Revisando", report.status)}
                  ${option("Solucionado", report.status)}
                  ${option("Descartado", report.status)}
                </select>
              </div>
            </div>

            <label>Comentario interno</label>
            <textarea id="report-comment-${id}">${escapeHtml(report.internalComment || "")}</textarea>

            <div class="actions">
              <button onclick="updateReport('${id}')">Guardar reporte</button>
              <button class="danger" onclick="deleteReport('${id}')">Eliminar</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderGroupedReports(grouped) {
      if (!grouped.length) {
        groupedReportsBox.innerHTML = "<p class='muted'>No hay reportes agrupados.</p>";
        return;
      }

      groupedReportsBox.innerHTML = grouped.map((item) => {
        return `
          <div class="report">
            <h3>${escapeHtml(item.channelName)} <span class="badge">${escapeHtml(item.total)} reportes</span></h3>
            <div class="muted">Categoría: ${escapeHtml(item.category)}</div>
            <div class="muted">Pendientes: ${escapeHtml(item.pending)}</div>
            <div class="muted">Último reporte: ${escapeHtml(item.lastReportedAt)}</div>
          </div>
        `;
      }).join("");
    }

    function option(value, selected) {
      return `<option ${value === selected ? "selected" : ""}>${escapeHtml(value)}</option>`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    if (getKey()) {
      refreshAll();
    }
  </script>
</body>
</html>

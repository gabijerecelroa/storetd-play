name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "release-*"

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.STORETD_KEYSTORE_BASE64 }}" | base64 -d > storetd-release.jks

      - name: Make Gradle executable
        run: chmod +x ./gradlew
        working-directory: android

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease
        working-directory: android

      - name: Sign release APK
        run: |
          BUILD_TOOLS_DIR="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)"
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"

          UNSIGNED_APK="$(find android/app/build/outputs/apk/release -name '*-release-unsigned.apk' | head -n 1)"

          if [ -z "$UNSIGNED_APK" ]; then
            echo "No unsigned release APK found"
            find android/app/build/outputs/apk/release -type f
            exit 1
          fi

          mkdir -p release-output

          "$ZIPALIGN" -p -f 4 "$UNSIGNED_APK" release-output/storetd-play-release-aligned.apk

          "$APKSIGNER" sign \
            --ks storetd-release.jks \
            --ks-pass pass:"${{ secrets.STORETD_KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.STORETD_KEY_ALIAS }}" \
            --key-pass pass:"${{ secrets.STORETD_KEY_PASSWORD }}" \
            --out release-output/storetd-play-release.apk \
            release-output/storetd-play-release-aligned.apk

          "$APKSIGNER" verify --verbose release-output/storetd-play-release.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: storetd-play-release-apk
          path: release-output/storetd-play-release.apk

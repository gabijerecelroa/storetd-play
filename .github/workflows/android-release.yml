name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "release-*"

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.STORETD_KEYSTORE_BASE64 }}" | tr -d '\r\n ' | base64 -d > storetd-release.jks
          ls -lh storetd-release.jks

      - name: Make Gradle executable
        run: chmod +x ./gradlew
        working-directory: android

      - name: Build signed release APK
        run: ./gradlew assembleRelease
        working-directory: android
        env:
          STORETD_KEYSTORE_FILE: ${{ github.workspace }}/storetd-release.jks
          STORETD_KEYSTORE_PASSWORD: ${{ secrets.STORETD_KEYSTORE_PASSWORD }}
          STORETD_KEY_ALIAS: ${{ secrets.STORETD_KEY_ALIAS }}
          STORETD_KEY_PASSWORD: ${{ secrets.STORETD_KEY_PASSWORD }}

      - name: Show release outputs
        run: find android/app/build/outputs/apk/release -type f -maxdepth 1 -print

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: storetd-play-release-apk
          path: android/app/build/outputs/apk/release/*.apk

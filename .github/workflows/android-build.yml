name: Android Build

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission to Gradle
        working-directory: android
        run: chmod +x gradlew

      - name: Run Android Lint
        working-directory: android
        run: ./gradlew lintDebug

      - name: Run Unit Tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        working-directory: android
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          APP_NAME: ${{ secrets.APP_NAME }}
          BRAND_PRIMARY_COLOR: ${{ secrets.BRAND_PRIMARY_COLOR }}
          BRAND_SECONDARY_COLOR: ${{ secrets.BRAND_SECONDARY_COLOR }}
          SUPPORT_WHATSAPP: ${{ secrets.SUPPORT_WHATSAPP }}
          SUPPORT_EMAIL: ${{ secrets.SUPPORT_EMAIL }}
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: storetd-play-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    needs: build-debug
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission to Gradle
        working-directory: android
        run: chmod +x gradlew

      - name: Decode Keystore
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 is not configured. Release signing cannot continue."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          APP_NAME: ${{ secrets.APP_NAME }}
          BRAND_PRIMARY_COLOR: ${{ secrets.BRAND_PRIMARY_COLOR }}
          BRAND_SECONDARY_COLOR: ${{ secrets.BRAND_SECONDARY_COLOR }}
          SUPPORT_WHATSAPP: ${{ secrets.SUPPORT_WHATSAPP }}
          SUPPORT_EMAIL: ${{ secrets.SUPPORT_EMAIL }}
        run: ./gradlew assembleRelease

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: storetd-play-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: android
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" app/build/outputs/apk/release/*.apk --clobber
